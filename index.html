<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lu Pengda</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafbfc;
            min-height: 100vh;
            color: #1a1a2e;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body.has-background::before {
            display: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        .profile-section {
            text-align: center;
            padding: 80px 0 60px;
            position: relative;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        .avatar-wrapper::before {
            content: '';
            position: absolute;
            inset: -8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #3b82f6);
            border-radius: 50%;
            animation: rotate 8s linear infinite;
            z-index: -1;
        }

        .avatar-wrapper::after {
            content: '';
            position: absolute;
            inset: -4px;
            background: #fafbfc;
            border-radius: 50%;
            z-index: -1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(99, 102, 241, 0.1);
            background: linear-gradient(135deg, #f0f0f5, #e8e8f0);
        }

        .username {
            font-size: 3em;
            font-weight: 700;
            background: linear-gradient(135deg, #1a1a2e 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .bio {
            font-size: 1.1em;
            color: rgba(26, 26, 46, 0.6);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .bio span {
            color: rgba(26, 26, 46, 0.3);
            margin: 0 10px;
        }

        .section {
            margin-top: 80px;
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }

        .section-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            margin-right: 20px;
            border: 1px solid rgba(99, 102, 241, 0.15);
        }

        .section-title {
            font-size: 1.8em;
            font-weight: 600;
            color: #1a1a2e;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
        }

        .note-card {
            background: #ffffff;
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 20px;
            padding: 32px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .note-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(139, 92, 246, 0.05));
            opacity: 0;
            transition: opacity 0.4s;
        }

        .note-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 40px -12px rgba(99, 102, 241, 0.15);
        }

        .note-card:hover::before {
            opacity: 1;
        }

        .note-card > * {
            position: relative;
            z-index: 1;
        }

        .note-number {
            font-size: 0.85em;
            color: rgba(99, 102, 241, 0.4);
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .note-title {
            font-size: 1.4em;
            color: #1a1a2e;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .note-content {
            color: rgba(26, 26, 46, 0.6);
            line-height: 1.8;
            font-size: 0.95em;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .project-card {
            background: #ffffff;
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 16px;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            padding: 32px;
            gap: 32px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            cursor: pointer;
        }

        .project-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.1);
            transform: translateY(-4px);
        }

        .project-card + .project-card {
            margin-top: 24px;
        }

        .project-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .project-name {
            font-size: 1.6em;
            color: #1a1a2e;
            margin-bottom: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        .project-name:hover {
            color: #6366f1;
        }

        .project-description {
            color: rgba(26, 26, 46, 0.6);
            line-height: 1.6;
            font-size: 1em;
            font-weight: 400;
            margin-bottom: 16px;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .project-tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            color: #ffffff;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .project-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .project-image {
            width: 280px;
            min-width: 280px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(139, 92, 246, 0.05));
            overflow: hidden;
        }

        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.15), transparent);
            margin: 60px 0;
        }

        /* Markdown viewer panel (full-screen when opened) */
        .md-panel {
            position: fixed;
            inset: 0;
            background: #ffffff;
            border-radius: 0;
            box-shadow: none;
            z-index: 60;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            transform: translateY(100%);
            transition: transform .25s ease;
        }

        .md-panel.open { transform: translateY(0); }

        .md-list {
            width: 320px;
            min-width: 220px;
            max-width: 40%;
            border-right: 1px solid rgba(0,0,0,0.06);
            overflow: auto;
            padding: 16px;
            background: #fbfdff;
        }

        .md-list h3 { font-size: 1.05em; margin: 6px 0 10px; }

        .md-list ul { list-style: none; padding: 0; margin: 0; }

        .md-list li + li { margin-top: 6px; }

        .md-list a { display:block; padding:8px 10px; color: #1a1a2e; text-decoration: none; border-radius:6px; }

        .md-list a:hover { background: rgba(99,102,241,0.06); }

        .md-content { flex:1; overflow-y: auto; overflow-x: hidden; padding:28px; display: flex; justify-content: center; }

        .md-content-wrapper { max-width: 800px; width: 100%; }

        .md-panel .close-btn { position: absolute; right: 14px; top: 12px; background: transparent; border: 0; font-size: 22px; cursor: pointer; z-index: 80; }

        /* Markdown content styles (simple GitHub-like) */
        .md-content {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            color: #111827;
            line-height: 1.7;
        }

        .md-content img { max-width: 100%; height: auto; display: block; margin: 12px 0; }
        .md-content pre { background: #0b1220; color: #e6eef8; padding: 12px; border-radius: 8px; overflow:auto; }
        .md-content code { background: rgba(27,31,35,0.05); padding: 2px 6px; border-radius: 6px; }
        .md-content h1, .md-content h2, .md-content h3 { margin: 18px 0 8px; }
        .md-content p { margin: 8px 0; }
        .md-content a { color: #2563eb; }

        /* Progress UI */
        .md-progress { padding: 8px; }
        .md-progress .progress { height: 10px; background: rgba(0,0,0,0.06); border-radius: 999px; overflow: hidden; }
        .md-progress .progress-bar { height: 100%; background: linear-gradient(90deg,#6366f1,#3b82f6); width: 0%; transition: width .15s linear; }
        .md-cancel-btn, .md-retry-btn { background: #ef4444; color: white; border: 0; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
        .md-retry-btn { background: #10b981; }

        @media (max-width: 900px) {
            .md-panel { right: 12px; left: 12px; width: auto; top: 80px; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            .username {
                font-size: 2.2em;
            }

            .avatar {
                width: 140px;
                height: 140px;
            }

            .section {
                margin-top: 60px;
            }

            .section-title {
                font-size: 1.5em;
            }

            .project-card {
                flex-direction: column;
                gap: 20px;
            }

            .project-image {
                width: 100%;
                min-width: unset;
                height: 180px;
            }

            .project-tags {
                gap: 6px;
            }

            .project-tag {
                padding: 5px 10px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <div class="avatar-wrapper">
                <img src="" alt="头像" class="avatar" id="avatar">
            </div>
            <h1 class="username" id="username"></h1>
            <p class="bio" id="bio"></p>
        </div>

        <div class="divider"></div>

        <div class="section">
            <div class="section-header">
                <!-- <div class="section-icon">📝</div> -->
                <h2 class="section-title">Notebook</h2>
            </div>
            <div class="notes-grid" id="notes-grid"></div>
        </div>

        <div class="section">
            <div class="section-header">
                <!-- <div class="section-icon">🚀</div> -->
                <h2 class="section-title">Projects</h2>
            </div>
            <div class="projects-grid" id="projects-grid"></div>
        </div>
    </div>

    <script>
        const tagColors = [
            { bg: '#FF6B6B', border: '#FF5252' },
            { bg: '#4ECDC4', border: '#45B7AA' },
            { bg: '#45B7D1', border: '#3A9DBF' },
            { bg: '#96CEB4', border: '#7BB89E' },
            { bg: '#FFEAA7', border: '#FFDD5E' },
            { bg: '#DDA0DD', border: '#BB7FCF' },
            { bg: '#87CEEB', border: '#6BB6D9' },
            { bg: '#F8B88B', border: '#F39C6B' },
            { bg: '#95E1D3', border: '#7DD3C0' },
            { bg: '#F38181', border: '#E56B6F' },
            { bg: '#AA96DA', border: '#968FD6' },
            { bg: '#FCBAD3', border: '#F99FBF' }
        ];

        function getTagColor(index) {
            return tagColors[index % tagColors.length];
        }

        async function loadConfig() {
            try {
                const response = await fetch('config.json');
                const config = await response.json();

                if (config.background) {
                    document.body.style.backgroundImage = `url(${config.background})`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundRepeat = 'no-repeat';
                    document.body.style.backgroundAttachment = 'fixed';
                    document.body.classList.add('has-background');
                } else {
                    document.body.style.background = '#fafbfc';
                    document.body.classList.remove('has-background');
                }

                document.getElementById('avatar').src = config.profile.avatar;
                document.getElementById('username').textContent = config.profile.username;
                document.getElementById('bio').innerHTML = config.profile.bio.replace(/·/g, ' <span>·</span> ');

                const notesGrid = document.getElementById('notes-grid');
                config.notes.forEach(note => {
                    const noteCard = document.createElement('div');
                    noteCard.className = 'note-card';
                    noteCard.innerHTML = `
                        <div class="note-number">${note.id}</div>
                        <div class="note-title">${note.title}</div>
                        <div class="note-content">${note.content}</div>
                    `;
                    if (note.link) {
                        noteCard.style.cursor = 'pointer';
                        noteCard.addEventListener('click', () => {
                            if (window.openMdFolder) window.openMdFolder(note.link, note.title);
                            else window.open(note.link, '_blank');
                        });
                    }
                    notesGrid.appendChild(noteCard);
                });

                const projectsGrid = document.getElementById('projects-grid');
                config.projects.forEach(project => {
                    const projectCard = document.createElement('div');
                    projectCard.className = 'project-card';
                    
                    let projectImageHTML;
                    if (project.image) {
                        projectImageHTML = `<img src="${project.image}" alt="${project.name}">`;
                    } else {
                        projectImageHTML = '';
                    }
                    
                    let tagsHTML = '';
                    if (project.tags && Array.isArray(project.tags)) {
                        tagsHTML = '<div class="project-tags">';
                        project.tags.forEach((tag, index) => {
                            const color = getTagColor(index);
                            tagsHTML += `<span class="project-tag" style="background: ${color.bg};">${tag}</span>`;
                        });
                        tagsHTML += '</div>';
                    }
                    
                    projectCard.innerHTML = `
                        <div class="project-info">
                            <div class="project-name">${project.name}</div>
                            <div class="project-description">${project.description}</div>
                            ${tagsHTML}
                        </div>
                        <div class="project-image">${projectImageHTML}</div>
                    `;

                    projectCard.addEventListener('click', () => {
                        if (window.openMdFolder) window.openMdFolder(project.link, project.name);
                        else window.open(project.link, '_blank');
                    });

                    projectsGrid.appendChild(projectCard);
                });
            } catch (error) {
                console.error('加载配置文件失败:', error);
            }
        }

        loadConfig();
    </script>

    <!-- Markdown viewer panel -->
    <div id="md-panel" class="md-panel" aria-hidden="true">
        <button id="md-panel-close" class="close-btn" title="关闭">✕</button>
        <div class="md-list">
            <h3 id="md-panel-title">Files</h3>
            <ul></ul>
        </div>
        <div class="md-content">选择一个 Markdown 文件以预览。</div>
    </div>

    <script src="src/marked.min.js"></script>
    <script src="src/purify.min.js"></script>
    <script src="src/md-viewer.js"></script>
</body>
</html>
